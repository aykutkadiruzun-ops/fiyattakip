name: Fiyat Takip
on:
  schedule:
    - cron: '0 5,10,17 * * *'
  workflow_dispatch:
    inputs:
      force_check_all:
        description: 'Kontrol zamani gelmemis urunleri de zorla kontrol et'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      enable_playwright:
        description: 'Son care olarak Playwright/Chromium fallback acilsin mi? Manuel test icin true yap.'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      playwright_max_per_run:
        description: 'Bu run icinde en fazla kac urunde Playwright denensin?'
        required: false
        default: '3'
jobs:
  deploy-edge-function:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Edge Function secretlerini ayarla
        run: |
          supabase secrets set \
            SUPABASE_URL="${SUPABASE_URL}" \
            SERVICE_KEY="${SERVICE_KEY}" \
            SCRAPER_KEY="${SCRAPER_KEY}" \
            RESEND_KEY="${RESEND_KEY}" \
            --project-ref uwxfrbljvmwtxecnqgrl
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SERVICE_KEY: ${{ secrets.SUPABASE_KEY }}
          SCRAPER_KEY: ${{ secrets.SCRAPER_KEY }}
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
      - name: Edge Function deploy et
        run: supabase functions deploy fiyat-guncelle --project-ref uwxfrbljvmwtxecnqgrl
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  takip:
    needs: deploy-edge-function
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Bagimliliklari kur
        run: pip install -r requirements.txt
      - name: Playwright kur (manuel fallback aciksa)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.enable_playwright == 'true' }}
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium
      - name: Fiyatlari kontrol et
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SCRAPER_KEY: ${{ secrets.SCRAPER_KEY }}
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          VAPID_EMAIL: ${{ secrets.VAPID_EMAIL }}
          MAX_PRODUCTS_PER_RUN: '40'
          PLAYWRIGHT_FALLBACK: ${{ github.event_name == 'workflow_dispatch' && inputs.enable_playwright || 'false' }}
          PLAYWRIGHT_MAX_PER_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.playwright_max_per_run || '3' }}
          FORCE_CHECK_ALL: ${{ github.event_name == 'workflow_dispatch' && inputs.force_check_all || 'false' }}
        run: python takip.py
