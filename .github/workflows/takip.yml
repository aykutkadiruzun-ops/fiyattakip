name: Fiyat Takip

on:
  schedule:
    - cron: '0 5,10,17 * * *'
  workflow_dispatch:

jobs:
  takip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Bagımlılıkları kur
        run: |
          pip install playwright pywebpush requests playwright-stealth
          playwright install chromium
          playwright install-deps chromium

      - name: Takip et
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SCRAPER_KEY: ${{ secrets.SCRAPER_KEY }}
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
        run: python takip.py
