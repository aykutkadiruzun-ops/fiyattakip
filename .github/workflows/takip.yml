name: Fiyat Takip

on:
  schedule:
    - cron: '0 5,10,17 * * *'
  workflow_dispatch:
    inputs:
      force_check_all:
        description: 'Kontrol zamani gelmemis urunleri de zorla kontrol et'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  takip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bagimliliklari kur
        run: pip install -r requirements.txt

      - name: Fiyatlari kontrol et
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SCRAPER_KEY: ${{ secrets.SCRAPER_KEY }}
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          VAPID_EMAIL: ${{ secrets.VAPID_EMAIL }}
          MAX_PRODUCTS_PER_RUN: '40'
          PLAYWRIGHT_FALLBACK: 'false'
          FORCE_CHECK_ALL: ${{ github.event_name == 'workflow_dispatch' && inputs.force_check_all || 'false' }}
        run: python takip.py
