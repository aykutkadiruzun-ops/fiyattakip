
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Rafta — Fiyat Takip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:  #2B2D42;
      --accent:   #6C63FF;
      --accent2:  #8B85FF;
      --bg:       #F8F8FA;
      --surface:  #FFFFFF;
      --border:   #E4E4EF;
      --text:     #2B2D42;
      --muted:    #8E8EA8;
      --success:  #22C55E;
      --danger:   #EF4444;
      --warning:  #F59E0B;
      --radius:   14px;
      --shadow:   0 2px 16px rgba(43,45,66,.08);
      --nav-h:    64px;
    }

    body {
      font-family: 'Figtree', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── AUTH ─────────────────────────────────── */
    #auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #2B2D42 0%, #1a1b2e 100%);
    }

    .auth-card {
      background: var(--surface);
      border-radius: 24px;
      padding: 44px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 80px rgba(0,0,0,.3);
    }

    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }

    .logo-icon {
      width: 42px; height: 42px;
      background: var(--primary);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-text { font-size: 24px; font-weight: 800; color: var(--primary); }
    .logo-text span { color: var(--accent); }

    .auth-tabs {
      display: flex; background: var(--bg);
      border-radius: 10px; padding: 4px; margin-bottom: 24px;
    }

    .auth-tab {
      flex: 1; padding: 10px; border: none; background: transparent;
      border-radius: 8px; font-family: 'Figtree', sans-serif;
      font-size: 14px; font-weight: 600; color: var(--muted); cursor: pointer; transition: all .2s;
    }

    .auth-tab.active { background: var(--surface); color: var(--primary); box-shadow: 0 1px 4px rgba(0,0,0,.12); }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
      border-radius: 10px; font-family: 'Figtree', sans-serif; font-size: 15px;
      color: var(--text); background: var(--surface); outline: none; transition: border-color .2s;
    }
    .form-group input:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%; padding: 13px; background: var(--accent); color: #fff;
      border: none; border-radius: 10px; font-family: 'Figtree', sans-serif;
      font-size: 15px; font-weight: 700; cursor: pointer; transition: background .2s; margin-top: 4px;
    }
    .btn-primary:hover { background: #5b54e8; }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }

    .auth-msg {
      border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-top: 12px; display: none;
    }
    .auth-msg.error   { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; }
    .auth-msg.success { background: #f0fdf4; color: var(--success); border: 1px solid #bbf7d0; }

    /* ── APP ──────────────────────────────────── */
    #app-screen { display: none; min-height: 100vh; background: var(--bg); padding-bottom: calc(var(--nav-h) + 16px); }

    /* ── TOPBAR ───────────────────────────────── */
    .topbar {
      background: var(--primary); padding: 0 20px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }

    .topbar-logo { font-size: 20px; font-weight: 800; color: #fff; }
    .topbar-logo span { color: var(--accent2); }

    .topbar-right { display: flex; align-items: center; gap: 8px; }

    .notif-btn {
      width: 36px; height: 36px; border: none; background: rgba(255,255,255,.1);
      border-radius: 10px; color: #fff; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; position: relative;
    }

    .notif-dot {
      position: absolute; top: 6px; right: 6px; width: 8px; height: 8px;
      background: var(--danger); border-radius: 50%; border: 2px solid var(--primary);
      display: none;
    }

    /* ── SAYFALAR ─────────────────────────────── */
    .page { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
    .page.active { display: block; }

    /* ── BOTTOM NAV ───────────────────────────── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h);
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-around;
      z-index: 100; padding: 0 8px;
    }

    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 4px; border: none; background: transparent; cursor: pointer;
      padding: 8px 4px; border-radius: 12px; transition: all .2s;
      color: var(--muted); font-family: 'Figtree', sans-serif;
    }

    .nav-btn .nav-icon { font-size: 20px; line-height: 1; }
    .nav-btn .nav-label { font-size: 10px; font-weight: 600; }
    .nav-btn.active { color: var(--accent); }

    .nav-btn.center-btn {
      width: 52px; height: 52px; flex: none;
      background: var(--accent); border-radius: 16px;
      color: #fff; font-size: 26px; padding: 0;
      box-shadow: 0 4px 16px rgba(108,99,255,.4);
      margin-bottom: 8px;
    }

    /* ── DASHBOARD ────────────────────────────── */
    .greeting { margin-bottom: 20px; }
    .greeting h2 { font-size: 22px; font-weight: 800; }
    .greeting p  { font-size: 14px; color: var(--muted); margin-top: 2px; }

    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }

    .stat-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 16px 12px; text-align: center; box-shadow: var(--shadow);
    }

    .stat-card .val { font-size: 24px; font-weight: 800; color: var(--primary); }
    .stat-card .lbl { font-size: 11px; color: var(--muted); font-weight: 600; margin-top: 2px; }
    .stat-card.accent .val { color: var(--accent); }
    .stat-card.success .val { color: var(--success); }
    .stat-card.warning .val { color: var(--warning); }

    .saving-banner {
      background: linear-gradient(135deg, var(--accent) 0%, #4f46e5 100%);
      border-radius: var(--radius); padding: 20px; color: #fff;
      margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between;
    }

    .saving-banner .amount { font-size: 28px; font-weight: 800; }
    .saving-banner .sublbl { font-size: 13px; opacity: .8; margin-top: 2px; }
    .saving-banner .icon { font-size: 36px; opacity: .7; }

    .section-title {
      font-size: 16px; font-weight: 700; margin-bottom: 12px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .see-all { font-size: 13px; color: var(--accent); font-weight: 600; cursor: pointer; background: none; border: none; font-family: 'Figtree', sans-serif; }

    /* ── ÜRÜN KARTI ───────────────────────────── */
    .product-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 18px; box-shadow: var(--shadow); margin-bottom: 10px;
      border: 1.5px solid var(--border); transition: border-color .2s;
    }

    .product-card.on-target  { border-color: var(--success); }
    .product-card.price-drop { border-color: var(--accent); }
    .product-card.bought     { opacity: .55; }

    .pc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .pc-name { font-size: 15px; font-weight: 700; line-height: 1.3; flex: 1; min-width: 0; }
    .pc-price { font-size: 18px; font-weight: 800; color: var(--primary); white-space: nowrap; }
    .pc-price.waiting { font-size: 13px; color: var(--muted); font-weight: 600; }
    .pc-price.good { color: var(--success); }
    .pc-price.drop { color: var(--accent); }

    .pc-url {
      font-size: 12px; color: var(--accent); text-decoration: none;
      display: block; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; margin: 4px 0 10px;
      max-width: 220px;
    }

    .pc-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .chip {
      padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 700;
    }

    .chip.green  { background: #f0fdf4; color: var(--success); border: 1px solid #bbf7d0; }
    .chip.purple { background: #f0eeff; color: var(--accent);  border: 1px solid #c4b5fd; }
    .chip.gray   { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
    .chip.orange { background: #fff7ed; color: var(--warning); border: 1px solid #fed7aa; }

    .pc-actions { display: flex; gap: 6px; margin-top: 10px; }

    .btn-sm {
      padding: 7px 14px; border-radius: 8px; font-family: 'Figtree', sans-serif;
      font-size: 12px; font-weight: 700; cursor: pointer; border: 1.5px solid var(--border);
      background: var(--bg); color: var(--muted); transition: all .15s;
    }

    .btn-sm.bought-btn.done { background: #f0fdf4; color: var(--success); border-color: #bbf7d0; }
    .btn-sm.del { background: #fef2f2; color: var(--danger); border-color: #fecaca; }

    /* ── ÜRÜN EKLE MODAL ──────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 200; display: none; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface); border-radius: 24px 24px 0 0;
      padding: 28px 24px 40px; width: 100%; max-width: 600px;
    }

    .modal-handle {
      width: 40px; height: 4px; background: var(--border);
      border-radius: 99px; margin: 0 auto 20px;
    }

    .modal h3 { font-size: 18px; font-weight: 800; margin-bottom: 20px; }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .field input, .field select {
      width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
      border-radius: 10px; font-family: 'Figtree', sans-serif; font-size: 15px;
      color: var(--text); background: var(--surface); outline: none; transition: border-color .2s;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }

    /* ── BİLDİRİMLER ──────────────────────────── */
    .notif-item {
      background: var(--surface); border-radius: var(--radius);
      padding: 16px; margin-bottom: 10px; box-shadow: var(--shadow);
      display: flex; align-items: flex-start; gap: 12px;
    }

    .notif-icon { font-size: 24px; flex-shrink: 0; }
    .notif-text h4 { font-size: 14px; font-weight: 700; }
    .notif-text p  { font-size: 13px; color: var(--muted); margin-top: 2px; }

    /* ── PROFİL ───────────────────────────────── */
    .profile-header {
      background: linear-gradient(135deg, var(--primary), #1a1b2e);
      border-radius: var(--radius); padding: 28px 20px; text-align: center;
      color: #fff; margin-bottom: 20px;
    }

    .avatar {
      width: 64px; height: 64px; background: var(--accent); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 800; color: #fff; margin: 0 auto 12px;
    }

    .profile-header h3 { font-size: 18px; font-weight: 800; }
    .profile-header p  { font-size: 13px; opacity: .7; margin-top: 4px; }

    .menu-list { background: var(--surface); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); margin-bottom: 12px; }

    .menu-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 18px; border-bottom: 1px solid var(--border); cursor: pointer;
      transition: background .15s;
    }

    .menu-item:last-child { border-bottom: none; }
    .menu-item:hover { background: var(--bg); }
    .menu-item-left { display: flex; align-items: center; gap: 12px; font-size: 15px; font-weight: 600; }
    .menu-item-icon { font-size: 20px; }
    .menu-item-arrow { color: var(--muted); font-size: 18px; }

    .btn-logout {
      width: 100%; padding: 14px; background: #fef2f2; color: var(--danger);
      border: 1.5px solid #fecaca; border-radius: var(--radius);
      font-family: 'Figtree', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all .2s; margin-top: 8px;
    }
    .btn-logout:hover { background: #fee2e2; }

    /* ── EMPTY STATE ──────────────────────────── */
    .empty {
      text-align: center; padding: 48px 20px; color: var(--muted);
    }
    .empty .eicon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 15px; line-height: 1.5; }

    /* ── TOAST ────────────────────────────────── */
    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(10px);
      background: var(--primary); color: #fff; padding: 12px 20px;
      border-radius: 10px; font-size: 14px; font-weight: 600;
      box-shadow: 0 4px 24px rgba(0,0,0,.2); opacity: 0;
      transition: all .25s; pointer-events: none; z-index: 999; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { background: var(--success); }
    #toast.error   { background: var(--danger); }

    /* ── SPINNER ──────────────────────────────── */
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-state { text-align: center; padding: 40px 20px; }
  </style>
</head>
<body>

<!-- ════ AUTH ════════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="logo">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M4 8L12 4L20 8" stroke="#6C63FF" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M4 12L12 8L20 12" stroke="white" stroke-width="2" stroke-linecap="round" opacity=".7"/>
          <path d="M6 16L12 19L18 16" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity=".4"/>
        </svg>
      </div>
      <div class="logo-text">rafta<span>.</span></div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Giriş Yap</button>
      <button class="auth-tab" onclick="switchTab('signup')">Kayıt Ol</button>
    </div>

    <div id="login-form">
      <div class="form-group">
        <label>E-posta</label>
        <input type="email" id="login-email" placeholder="ornek@email.com" />
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" />
      </div>
      <button class="btn-primary" id="btn-login" onclick="doLogin()">Giriş Yap</button>
    </div>

    <div id="signup-form" style="display:none">
      <div class="form-group">
        <label>E-posta</label>
        <input type="email" id="signup-email" placeholder="ornek@email.com" />
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="signup-pass" placeholder="En az 6 karakter" onkeydown="if(event.key==='Enter')doSignup()" />
      </div>
      <button class="btn-primary" id="btn-signup" onclick="doSignup()">Hesap Oluştur</button>
    </div>

    <div class="auth-msg error" id="auth-error"></div>
    <div class="auth-msg success" id="auth-success"></div>
  </div>
</div>

<!-- ════ APP ═════════════════════════════════════ -->
<div id="app-screen">
  <nav class="topbar">
    <div class="topbar-logo">rafta<span>.</span></div>
    <div class="topbar-right">
      <button class="notif-btn" onclick="goPage('notifications')">
        🔔
        <span class="notif-dot" id="notif-dot"></span>
      </button>
    </div>
  </nav>

  <!-- Ana Sayfa -->
  <div class="page active" id="page-home">
    <div class="greeting">
      <h2>Merhaba 👋</h2>
      <p id="greeting-sub">Bugün senin için harika fırsatlar var!</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card accent">
        <div class="val" id="stat-total">0</div>
        <div class="lbl">Takip edilen</div>
      </div>
      <div class="stat-card warning">
        <div class="val" id="stat-drop">0</div>
        <div class="lbl">Fiyat düştü</div>
      </div>
      <div class="stat-card success">
        <div class="val" id="stat-target">0</div>
        <div class="lbl">Hedefe ulaştı</div>
      </div>
    </div>

    <div class="saving-banner">
      <div>
        <div class="amount">₺<span id="stat-saving">0</span></div>
        <div class="sublbl">Toplam tasarruf ettiğin tutar</div>
      </div>
      <div class="icon">💰</div>
    </div>

    <div class="section-title">
      Takipteki Ürünler
      <button class="see-all" onclick="goPage('products')">Tümünü Gör</button>
    </div>
    <div id="home-products"></div>
  </div>

  <!-- Ürünlerim -->
  <div class="page" id="page-products">
    <div class="section-title" style="margin-bottom:16px">
      Ürünlerim
      <span id="product-count" style="font-size:13px;color:var(--muted);font-weight:600"></span>
    </div>
    <div id="all-products"></div>
  </div>

  <!-- Bildirimler -->
  <div class="page" id="page-notifications">
    <div class="section-title" style="margin-bottom:16px">Bildirimler</div>
    <div id="notif-list"></div>
  </div>

  <!-- Profil -->
  <div class="page" id="page-profile">
    <div class="profile-header">
      <div class="avatar" id="avatar-initials">?</div>
      <h3 id="profile-email">—</h3>
      <p>Rafta üyesi</p>
    </div>

    <div class="menu-list">
      <div class="menu-item" onclick="goPage('products')">
        <div class="menu-item-left"><span class="menu-item-icon">🏷️</span> Ürünlerim</div>
        <span class="menu-item-arrow">›</span>
      </div>
      <div class="menu-item" onclick="showBought()">
        <div class="menu-item-left"><span class="menu-item-icon">🛍️</span> Satın Alınan Ürünler</div>
        <span class="menu-item-arrow">›</span>
      </div>
    </div>

    <button class="btn-logout" onclick="doLogout()">Çıkış Yap</button>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="goPage('home')">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Ana Sayfa</span>
    </button>
    <button class="nav-btn" id="nav-products" onclick="goPage('products')">
      <span class="nav-icon">🏷️</span>
      <span class="nav-label">Ürünlerim</span>
    </button>
    <button class="nav-btn center-btn" onclick="openModal()">＋</button>
    <button class="nav-btn" id="nav-notifications" onclick="goPage('notifications')">
      <span class="nav-icon">🔔</span>
      <span class="nav-label">Bildirimler</span>
    </button>
    <button class="nav-btn" id="nav-profile" onclick="goPage('profile')">
      <span class="nav-icon">👤</span>
      <span class="nav-label">Profil</span>
    </button>
  </nav>
</div>

<!-- ════ MODAL — Ürün Ekle ════════════════════════ -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>Ürün Takibe Al</h3>

    <div class="field">
      <label>Ürün Linki</label>
      <input type="url" id="new-url" placeholder="https://www.trendyol.com/..." />
    </div>
    <div class="field">
      <label>Hedef Fiyat (₺)</label>
      <input type="number" id="new-target" placeholder="örn. 450" min="0" step="0.01" />
    </div>
    <div class="field">
      <label>Kategori</label>
      <select id="new-category">
        <option value="">Seçiniz</option>
        <option>Giyim</option>
        <option>Elektronik</option>
        <option>Aksesuar</option>
        <option>Ev &amp; Yaşam</option>
        <option>Spor</option>
        <option>Diğer</option>
      </select>
    </div>

    <button class="btn-primary" id="btn-add" onclick="addProduct()">Takibe Al</button>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL  = 'https://uwxfrbljvmwtxecnqgrl.supabase.co';
const SUPABASE_ANON = 'sb_publishable_L567-kgj8bZmK6uhMABbkA_VwhqrGCn';
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

let allProducts = [];
let currentUser = null;

// ── Helpers ─────────────────────────────────────
window.showToast = (msg, type='') => {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  clearTimeout(t._t); t._t = setTimeout(() => t.className = '', 3000);
};

const fmt = n => {
  if (!n || isNaN(Number(n))) return 'Bekleniyor';
  return '₺' + Number(n).toLocaleString('tr-TR', {minimumFractionDigits:2});
};

// ── Auth ─────────────────────────────────────────
window.switchTab = (tab) => {
  document.getElementById('login-form').style.display  = tab==='login'  ? '' : 'none';
  document.getElementById('signup-form').style.display = tab==='signup' ? '' : 'none';
  document.querySelectorAll('.auth-tab').forEach((b,i) => b.classList.toggle('active', (tab==='login'&&i===0)||(tab==='signup'&&i===1)));
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('auth-success').style.display = 'none';
};

window.doLogin = async () => {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  if (!email || !pass) { showAuthError('E-posta ve şifre gerekli.'); return; }
  const btn = document.getElementById('btn-login');
  btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true;
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  btn.innerHTML = 'Giriş Yap'; btn.disabled = false;
  if (error) showAuthError(error.message);
};

window.doSignup = async () => {
  const email = document.getElementById('signup-email').value.trim();
  const pass  = document.getElementById('signup-pass').value;
  if (!email || !pass) { showAuthError('E-posta ve şifre gerekli.'); return; }
  if (pass.length < 6) { showAuthError('Şifre en az 6 karakter olmalı.'); return; }
  const btn = document.getElementById('btn-signup');
  btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true;
  const { error } = await sb.auth.signUp({ email, password: pass });
  btn.innerHTML = 'Hesap Oluştur'; btn.disabled = false;
  if (error) { showAuthError(error.message); return; }
  document.getElementById('auth-success').textContent = '✅ Hesap oluşturuldu! E-postanı doğrula.';
  document.getElementById('auth-success').style.display = 'block';
};

window.doLogout = async () => { await sb.auth.signOut(); };

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg; el.style.display = 'block';
}

// ── Session ──────────────────────────────────────
sb.auth.onAuthStateChange((_e, session) => {
  if (session) {
    currentUser = session.user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display  = 'block';
    const email = session.user.email;
    document.getElementById('profile-email').textContent = email;
    document.getElementById('avatar-initials').textContent = email[0].toUpperCase();
    loadProducts();
  } else {
    currentUser = null;
    document.getElementById('auth-screen').style.display = '';
    document.getElementById('app-screen').style.display  = 'none';
  }
});

// ── Sayfa Geçişi ─────────────────────────────────
window.goPage = (name) => {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn:not(.center-btn)').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name)?.classList.add('active');
  document.getElementById('nav-' + name)?.classList.add('active');
  if (name === 'products')      renderAllProducts();
  if (name === 'notifications') renderNotifications();
};

// ── Modal ─────────────────────────────────────────
window.openModal  = () => document.getElementById('modal-overlay').classList.add('open');
window.closeModal = () => document.getElementById('modal-overlay').classList.remove('open');
window.closeModalOutside = (e) => { if (e.target.id === 'modal-overlay') closeModal(); };

// ── Ürün Yükle ───────────────────────────────────
async function loadProducts() {
  if (!currentUser) return;
  const { data, error } = await sb
    .from('urunler').select('*')
    .eq('email', currentUser.email)
    .order('id', { ascending: false });
  if (error) { showToast('Yüklenemedi.', 'error'); return; }
  allProducts = data || [];
  renderDashboard();
  renderHomeProducts();
}

// ── Dashboard ─────────────────────────────────────
function renderDashboard() {
  const active = allProducts.filter(p => !p.satin_alindi);
  const drops  = active.filter(p => p.ilk_fiyat && p.son_fiyat && Number(p.son_fiyat) < Number(p.ilk_fiyat));
  const target = active.filter(p => p.hedef_fiyat && p.son_fiyat && Number(p.son_fiyat) <= Number(p.hedef_fiyat));
  const saving = allProducts.reduce((s, p) => s + (Number(p.tasarruf) || 0), 0);

  document.getElementById('stat-total').textContent  = active.length;
  document.getElementById('stat-drop').textContent   = drops.length;
  document.getElementById('stat-target').textContent = target.length;
  document.getElementById('stat-saving').textContent = saving.toLocaleString('tr-TR');

  if (drops.length > 0) document.getElementById('notif-dot').style.display = 'block';
}

// ── Home Ürünler (son 3) ─────────────────────────
function renderHomeProducts() {
  const el = document.getElementById('home-products');
  const list = allProducts.filter(p => !p.satin_alindi).slice(0, 3);
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="eicon">🛍️</div><p>Henüz takip ettiğin ürün yok.<br>+ butonuna bas ve ekle!</p></div>`;
    return;
  }
  el.innerHTML = list.map(productCardHTML).join('');
}

// ── Tüm Ürünler ──────────────────────────────────
function renderAllProducts() {
  const el = document.getElementById('all-products');
  const list = allProducts.filter(p => !p.satin_alindi);
  document.getElementById('product-count').textContent = list.length + ' ürün';
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="eicon">📦</div><p>Takip ettiğin ürün yok.</p></div>`;
    return;
  }
  el.innerHTML = list.map(productCardHTML).join('');
}

// ── Kart HTML ────────────────────────────────────
function productCardHTML(p) {
  const drop    = p.ilk_fiyat && p.son_fiyat && Number(p.son_fiyat) < Number(p.ilk_fiyat);
  const onTarget= p.hedef_fiyat && p.son_fiyat && Number(p.son_fiyat) <= Number(p.hedef_fiyat);
  const cls     = onTarget ? 'on-target' : drop ? 'price-drop' : '';
  const priceCls= onTarget ? 'good' : drop ? 'drop' : '';

  const chips = [];
  if (onTarget) chips.push('<span class="chip green">🎯 Hedefe ulaştı</span>');
  else if (drop) {
    const diff = Number(p.ilk_fiyat) - Number(p.son_fiyat);
    chips.push(`<span class="chip purple">↓ ₺${diff.toLocaleString('tr-TR')} düştü</span>`);
  }
  if (p.hedef_fiyat && !onTarget) chips.push(`<span class="chip gray">Hedef: ${fmt(p.hedef_fiyat)}</span>`);
  if (p.tasarruf && Number(p.tasarruf) > 0) chips.push(`<span class="chip green">💰 ₺${Number(p.tasarruf).toLocaleString('tr-TR')} tasarruf</span>`);

  return `
  <div class="product-card ${cls}">
    <div class="pc-top">
      <div style="flex:1">
        <div class="pc-name">${p.urun_adi || 'İsim bekleniyor…'}</div>
        <a class="pc-url" href="${p.url}" target="_blank" rel="noopener">${p.url}</a>
      </div>
      <div class="pc-price ${priceCls || (!p.son_fiyat ? 'waiting' : '')}">${p.son_fiyat && !isNaN(Number(p.son_fiyat)) ? fmt(p.son_fiyat) : 'Fiyat bekleniyor'}</div>
    </div>
    <div class="pc-meta">${chips.join('')}</div>
    <div class="pc-actions">
      <button class="btn-sm bought-btn ${p.satin_alindi?'done':''}" onclick="toggleBought(${p.id},${!!p.satin_alindi})">
        ${p.satin_alindi ? '✓ Alındı' : 'Satın Aldım'}
      </button>
      <button class="btn-sm del" onclick="deleteProduct(${p.id})">🗑 Sil</button>
    </div>
  </div>`;
}

// ── Bildirimler ──────────────────────────────────
function renderNotifications() {
  const el = document.getElementById('notif-list');
  const drops  = allProducts.filter(p => !p.satin_alindi && p.ilk_fiyat && p.son_fiyat && Number(p.son_fiyat) < Number(p.ilk_fiyat));
  const target = allProducts.filter(p => !p.satin_alindi && p.hedef_fiyat && p.son_fiyat && Number(p.son_fiyat) <= Number(p.hedef_fiyat));

  if (!drops.length && !target.length) {
    el.innerHTML = `<div class="empty"><div class="eicon">🔔</div><p>Henüz bildirim yok.<br>Fiyat düştüğünde burada görünecek.</p></div>`;
    return;
  }

  const items = [
    ...target.map(p => `
      <div class="notif-item">
        <div class="notif-icon">🎯</div>
        <div class="notif-text">
          <h4>${p.urun_adi || 'Ürün'} hedefe ulaştı!</h4>
          <p>Güncel fiyat ${fmt(p.son_fiyat)} — Hedef: ${fmt(p.hedef_fiyat)}</p>
        </div>
      </div>`),
    ...drops.map(p => {
      const diff = Number(p.ilk_fiyat) - Number(p.son_fiyat);
      return `
      <div class="notif-item">
        <div class="notif-icon">📉</div>
        <div class="notif-text">
          <h4>${p.urun_adi || 'Ürün'} fiyatı düştü!</h4>
          <p>${fmt(p.ilk_fiyat)} → ${fmt(p.son_fiyat)} (₺${diff.toLocaleString('tr-TR')} indi)</p>
        </div>
      </div>`;
    })
  ];

  el.innerHTML = items.join('');
}

// ── Satın Alınanlar ──────────────────────────────
window.showBought = () => {
  const list = allProducts.filter(p => p.satin_alindi);
  const el = document.getElementById('all-products');
  document.getElementById('product-count').textContent = list.length + ' ürün';
  el.innerHTML = list.length
    ? list.map(productCardHTML).join('')
    : `<div class="empty"><div class="eicon">✅</div><p>Henüz satın alınan ürün yok.</p></div>`;
  goPage('products');
};

// ── Ürün Ekle ────────────────────────────────────
window.addProduct = async () => {
  const url    = document.getElementById('new-url').value.trim();
  const target = document.getElementById('new-target').value.trim();
  const cat    = document.getElementById('new-category').value;

  if (!url) { showToast('Link gerekli.', 'error'); return; }
  if (!url.includes('trendyol.com')) { showToast('Trendyol linki gir.', 'error'); return; }

  const btn = document.getElementById('btn-add');
  btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true;

  const { error } = await sb.from('urunler').insert([{
    url,
    email:       currentUser.email,
    hedef_fiyat: target ? parseFloat(target) : null,
    urun_adi:    cat || null,
  }]);

  btn.innerHTML = 'Takibe Al'; btn.disabled = false;

  if (error) { showToast('Eklenemedi: ' + error.message, 'error'); return; }

  document.getElementById('new-url').value    = '';
  document.getElementById('new-target').value = '';
  document.getElementById('new-category').value = '';
  closeModal();
  showToast('Ürün eklendi! ✅', 'success');
  loadProducts();
};

// ── Satın Alındı ─────────────────────────────────
window.toggleBought = async (id, current) => {
  const { error } = await sb.from('urunler').update({ satin_alindi: !current }).eq('id', id);
  if (error) { showToast('Hata.', 'error'); return; }
  await loadProducts();
  renderAllProducts();
};

// ── Sil ──────────────────────────────────────────
window.deleteProduct = async (id) => {
  if (!confirm('Bu ürünü silmek istiyor musun?')) return;
  const { error } = await sb.from('urunler').delete().eq('id', id);
  if (error) { showToast('Silinemedi.', 'error'); return; }
  showToast('Silindi.', 'success');
  await loadProducts();
  renderAllProducts();
};
</script>
</body>
</html>
