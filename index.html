<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Droppy — Fiyat Takip</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f7ff; color: #1a1a2e; }
.app { max-width: 680px; margin: 0 auto; background: white; min-height: 100vh; }
.nav { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; border-bottom: 1px solid #eee; }
.logo { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 600; color: #1a1a2e; text-decoration: none; }
.logo-icon { width: 30px; height: 30px; background: #534AB7; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.nav-tabs { display: flex; gap: 4px; }
.nav-tab { padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; color: #666; border: none; background: none; font-family: inherit; }
.nav-tab.active { background: #EEEDFE; color: #534AB7; font-weight: 500; }
.page { display: none; padding: 1.5rem; }
.page.active { display: block; }
.hero-sm { text-align: center; padding: 1.5rem 0 2rem; }
.hero-sm h1 { font-size: 26px; font-weight: 600; margin-bottom: 0.5rem; }
.hero-sm h1 span { color: #534AB7; }
.hero-sm p { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
.form-card { background: white; border: 1px solid #eee; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.field { margin-bottom: 0.75rem; }
.field label { font-size: 12px; color: #666; display: block; margin-bottom: 5px; }
.field input, .field select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fafafa; color: #1a1a2e; font-family: inherit; }
.field input:focus, .field select:focus { outline: none; border-color: #534AB7; box-shadow: 0 0 0 3px #EEEDFE; background: white; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.submit-btn { width: 100%; padding: 12px; background: #534AB7; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.2s; }
.submit-btn:hover { background: #3C3489; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.stat { background: #f8f7ff; border-radius: 10px; padding: 0.875rem; text-align: center; }
.stat-num { font-size: 20px; font-weight: 600; color: #1a1a2e; }
.stat-label { font-size: 11px; color: #888; margin-top: 3px; }
.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.filter-btn { padding: 5px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid #ddd; background: none; color: #666; font-family: inherit; }
.filter-btn.active { background: #534AB7; color: white; border-color: #534AB7; }
.product-list { display: flex; flex-direction: column; gap: 10px; }
.product-card { background: white; border: 1px solid #eee; border-radius: 12px; padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.product-info { flex: 1; min-width: 0; }
.product-name { font-size: 14px; font-weight: 500; color: #1a1a2e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.product-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
.cat-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #EEEDFE; color: #534AB7; }
.product-site { font-size: 11px; color: #888; }
.product-price { text-align: right; flex-shrink: 0; }
.price-current { font-size: 16px; font-weight: 600; color: #1a1a2e; }
.price-old { font-size: 12px; color: #aaa; text-decoration: line-through; }
.price-drop { font-size: 11px; color: #0F6E56; font-weight: 500; }
.icon-btn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid #eee; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #888; }
.icon-btn:hover { background: #f8f7ff; }
.product-actions { display: flex; gap: 6px; }
.cat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.cat-card { background: white; border: 1px solid #eee; border-radius: 12px; padding: 1.25rem 1rem; text-align: center; cursor: pointer; transition: border-color 0.2s; }
.cat-card:hover { border-color: #534AB7; }
.cat-icon { font-size: 28px; margin-bottom: 8px; color: #534AB7; }
.cat-name { font-size: 13px; font-weight: 500; color: #1a1a2e; }
.cat-count { font-size: 11px; color: #888; margin-top: 2px; }
.success-msg { background: #E1F5EE; color: #0F6E56; padding: 12px; border-radius: 8px; font-size: 13px; text-align: center; margin-top: 10px; display: none; }
</style>
</head>
<body>
<div class="app">
  <nav class="nav">
    <a href="#" class="logo" onclick="showPage('home')">
      <div class="logo-icon"><i class="ti ti-bell-ringing" style="color:white;font-size:16px"></i></div>
      Droppy
    </a>
    <div class="nav-tabs">
      <button class="nav-tab active" id="tab-home" onclick="showPage('home')">Anasayfa</button>
      <button class="nav-tab" id="tab-products" onclick="showPage('products')">Urunlerim</button>
      <button class="nav-tab" id="tab-categories" onclick="showPage('categories')">Kategoriler</button>
    </div>
  </nav>

  <div class="page active" id="page-home">
    <div class="hero-sm">
      <h1>Fiyat dusunce <span>sen al</span></h1>
      <p>Urun linkini yapistir, indirime girince haber verelim</p>
    </div>
    <div class="form-card">
      <div class="field">
        <label>Urun linki</label>
        <input type="text" id="input-url" placeholder="https://www.trendyol.com/..." />
      </div>
      <div class="row2">
        <div class="field">
          <label>E-posta</label>
          <input type="email" id="input-email" placeholder="ornek@gmail.com" />
        </div>
        <div class="field">
          <label>Kategori</label>
          <select id="input-cat">
            <option>Giyim</option>
            <option>Elektronik</option>
            <option>Aksesuar</option>
            <option>Ev & Yasam</option>
            <option>Spor</option>
            <option>Diger</option>
          </select>
        </div>
      </div>
      <button class="submit-btn" onclick="takipeAl()">Takibe Al</button>
      <div class="success-msg" id="success-msg">Urun takibe alindi! Fiyat dusunce haber veririz.</div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">Takip edilen</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-dropped">0</div>
        <div class="stat-label">Fiyat dustu</div>
      </div>
      <div class="stat">
        <div class="stat-num">Ucretsiz</div>
        <div class="stat-label">Sonsuza kadar</div>
      </div>
    </div>
  </div>

  <div class="page" id="page-products">
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterProducts(this,'all')">Tumu</button>
      <button class="filter-btn" onclick="filterProducts(this,'Giyim')">Giyim</button>
      <button class="filter-btn" onclick="filterProducts(this,'Elektronik')">Elektronik</button>
      <button class="filter-btn" onclick="filterProducts(this,'Aksesuar')">Aksesuar</button>
      <button class="filter-btn" onclick="filterProducts(this,'Spor')">Spor</button>
      <button class="filter-btn" onclick="filterProducts(this,'Ev & Yasam')">Ev & Yasam</button>
    </div>
    <div class="product-list" id="product-list">
      <div class="empty" id="empty-msg">Henuz urun eklemediniz.</div>
    </div>
  </div>

  <div class="page" id="page-categories">
    <div class="cat-grid">
      <div class="cat-card" onclick="goCategory('Giyim')">
        <div class="cat-icon"><i class="ti ti-shirt"></i></div>
        <div class="cat-name">Giyim</div>
        <div class="cat-count" id="count-Giyim">0 urun</div>
      </div>
      <div class="cat-card" onclick="goCategory('Elektronik')">
        <div class="cat-icon"><i class="ti ti-device-laptop"></i></div>
        <div class="cat-name">Elektronik</div>
        <div class="cat-count" id="count-Elektronik">0 urun</div>
      </div>
      <div class="cat-card" onclick="goCategory('Aksesuar')">
        <div class="cat-icon"><i class="ti ti-watch"></i></div>
        <div class="cat-name">Aksesuar</div>
        <div class="cat-count" id="count-Aksesuar">0 urun</div>
      </div>
      <div class="cat-card" onclick="goCategory('Spor')">
        <div class="cat-icon"><i class="ti ti-bike"></i></div>
        <div class="cat-name">Spor</div>
        <div class="cat-count" id="count-Spor">0 urun</div>
      </div>
      <div class="cat-card" onclick="goCategory('Ev & Yasam')">
        <div class="cat-icon"><i class="ti ti-home"></i></div>
        <div class="cat-name">Ev & Yasam</div>
        <div class="cat-count" id="count-EV">0 urun</div>
      </div>
      <div class="cat-card" onclick="goCategory('Diger')">
        <div class="cat-icon"><i class="ti ti-dots"></i></div>
        <div class="cat-name">Diger</div>
        <div class="cat-count" id="count-Diger">0 urun</div>
      </div>
    </div>
  </div>
</div>

<script>
var products = [];

function showPage(name) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.nav-tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

function takipeAl() {
  var url = document.getElementById('input-url').value.trim();
  var email = document.getElementById('input-email').value.trim();
  var cat = document.getElementById('input-cat').value;
  if (!url || !email) { alert('Lutfen URL ve e-posta giriniz.'); return; }
  var site = 'Diger';
  if (url.includes('trendyol')) site = 'Trendyol';
  else if (url.includes('hepsiburada')) site = 'Hepsiburada';
  else if (url.includes('amazon')) site = 'Amazon';
  else if (url.includes('zara')) site = 'Zara';
  else if (url.includes('mango')) site = 'Mango';
  var urun = { url: url, email: email, cat: cat, site: site, name: site + ' urunu', fiyat: 'Bekleniyor' };
  products.push(urun);
  document.getElementById('input-url').value = '';
  document.getElementById('input-email').value = '';
  var msg = document.getElementById('success-msg');
  msg.style.display = 'block';
  setTimeout(function(){ msg.style.display = 'none'; }, 3000);
  updateStats();
  renderProducts();
  updateCounts();
}

function updateStats() {
  document.getElementById('stat-total').textContent = products.length;
}

function renderProducts(filter) {
  var list = document.getElementById('product-list');
  var filtered = filter ? products.filter(function(p){ return p.cat === filter; }) : products;
  if (filtered.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:3rem 1rem;color:#888;font-size:14px">Henuz urun eklemediniz.</div>';
    return;
  }
  var html = '';
  filtered.forEach(function(p, i) {
    html += '<div class="product-card" data-cat="' + p.cat + '">' +
      '<div class="product-info">' +
      '<div class="product-name">' + p.name + '</div>' +
      '<div class="product-meta"><span class="cat-badge">' + p.cat + '</span><span class="product-site">' + p.site + '</span></div>' +
      '</div>' +
      '<div class="product-price"><div class="price-current">' + p.fiyat + '</div></div>' +
      '<div class="product-actions">' +
      '<a href="' + p.url + '" target="_blank" class="icon-btn"><i class="ti ti-external-link" style="font-size:14px"></i></a>' +
      '<button class="icon-btn" onclick="sil(' + i + ')"><i class="ti ti-trash" style="font-size:14px"></i></button>' +
      '</div></div>';
  });
  list.innerHTML = html;
}

function sil(i) {
  products.splice(i, 1);
  updateStats();
  renderProducts();
  updateCounts();
}

function filterProducts(btn, cat) {
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderProducts(cat === 'all' ? null : cat);
}

function updateCounts() {
  var cats = ['Giyim','Elektronik','Aksesuar','Spor','Diger'];
  cats.forEach(function(c) {
    var count = products.filter(function(p){ return p.cat === c; }).length;
    var el = document.getElementById('count-' + c);
    if (el) el.textContent = count + ' urun';
  });
  var ev = products.filter(function(p){ return p.cat === 'Ev & Yasam'; }).length;
  document.getElementById('count-EV').textContent = ev + ' urun';
}

function goCategory(cat) {
  showPage('products');
  document.querySelectorAll('.filter-btn').forEach(function(b){
    b.classList.remove('active');
    if(b.textContent === cat) b.classList.add('active');
  });
  renderProducts(cat);
}
</script>
</body>
</html>
